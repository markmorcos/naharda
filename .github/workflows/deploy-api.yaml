name: deploy-api

# Triggers the infrastructure repo's deploy-app workflow for the API service
# (project.md §11). The matching `deploy-naharda-api` dispatch type is registered
# in markmorcos/infrastructure. Payload mirrors the eventlane contract.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger infrastructure deployment
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.INFRASTRUCTURE_PAT }}
          repository: markmorcos/infrastructure
          event-type: deploy-naharda-api
          client-payload: |-
            {
              "repository": "markmorcos/naharda",
              "token": "${{ secrets.DEPLOYMENT_TOKEN }}",
              "version": "${{ github.sha }}",
              "config_file": "api/deployment.yaml"
            }
