version: 0.6.2

namespace: naharda
project: analytics

services:
  - name: analytics
    image: ghcr.io/markmorcos/naharda-analytics
    context: analytics
    port: 3000
    env:
      - name: DATABASE_TYPE
        value: "postgresql"
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: naharda-analytics
            key: DATABASE_URL
      - name: APP_SECRET
        valueFrom:
          secretKeyRef:
            name: naharda-analytics
            key: APP_SECRET
    ingress:
      host: analytics.naharda.com
      path: /?(.*)
      pathType: ImplementationSpecific
