# Values for the infrastructure Helm chart (project.md §11). Mirrors the
# {version, namespace, project, services} schema. Resolves to
# naharda-web-deployment in namespace `naharda`.
version: 0.6.2

namespace: naharda
project: web

services:
  - name: web
    image: ghcr.io/markmorcos/naharda-web
    context: web
    port: 8080
    env:
      - name: HOST
        value: "0.0.0.0"
      - name: PORT
        value: "8080"
      # In-cluster API URL for server-side fetches — the chart creates the Service
      # as {namespace}-{name}-service, i.e. naharda-api-service (NOT the deployment).
      - name: API_BASE
        value: "http://naharda-api-service:8080"
      # Public API base used by client-side calls (email capture).
      - name: PUBLIC_API_BASE
        value: "https://api.naharda.com"
      # Cookieless Umami analytics (add-analytics). Base.astro injects the
      # tracking script only when both are set; read at runtime (SSR).
      - name: PUBLIC_UMAMI_SRC
        value: "https://analytics.naharda.com/script.js"
      - name: PUBLIC_UMAMI_WEBSITE_ID
        value: "98a94b0f-de74-449a-977c-0d4d64c394b5"
    ingress:
      host: naharda.com
      # naharda.com has a www DNS record, so include www.naharda.com in the cert
      # and enable the www<->apex redirect. api/analytics have no www record and
      # intentionally leave this unset.
      www: true
      path: /?(.*)
      pathType: ImplementationSpecific
